<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR 自动标注控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="fixed inset-0 -z-10 bg-gradient"></div>

  <!-- ===== 顶部导航 ===== -->
  <nav class="glass-nav">
    <div class="brand">OCR 自动标注</div>
    <div class="tabs">
      <button data-tab="dataset" class="tab active"><span>数据集</span></button>
      <button data-tab="run" class="tab"><span>运行控制台</span></button>
      <button data-tab="dashboard" class="tab"><span>仪表盘</span></button>
      <button data-tab="correct" class="tab"><span>人工修正</span></button>
    </div>
    <div class="ml-auto text-xs text-muted flex-center gap-3">
      <span id="gpu-status" class="text-muted">GPU: 未知</span>
    </div>
  </nav>

  <main>
    <!-- ================================================================ -->
    <!-- 1. 数据集页 -->
    <!-- ================================================================ -->
    <section id="page-dataset" class="page">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <!-- 输入目录选择 -->
        <div class="glass-card">
          <h2 class="text-lg font-semibold mb-3">输入目录</h2>
          <div class="flex gap-2 mb-3">
            <input id="ds-input-path" class="input" placeholder="C:\Users\BTW\Desktop\20260328new" value="C:\Users\BTW\Desktop\20260328new">
            <button class="btn-ghost" onclick="browseDir(document.getElementById('ds-input-path').value, 'input')">浏览</button>
          </div>
          <div id="ds-input-info" class="text-sm text-muted"></div>
        </div>
        <!-- 输出目录选择 -->
        <div class="glass-card">
          <h2 class="text-lg font-semibold mb-3">输出目录</h2>
          <div class="flex gap-2 mb-3">
            <input id="ds-output-path" class="input" placeholder="out" value="out">
            <button class="btn-ghost" onclick="browseDir(document.getElementById('ds-output-path').value, 'output')">浏览</button>
          </div>
          <div id="ds-output-info" class="text-sm text-muted">默认在项目根目录下生成 out/</div>
        </div>
      </div>

      <!-- 目录浏览 -->
      <div class="glass-card mt-5">
        <div class="flex items-center gap-2 mb-3">
          <h2 class="text-lg font-semibold">目录浏览</h2>
          <span id="ds-breadcrumb" class="text-xs text-muted text-mono"></span>
        </div>
        <div id="ds-browser" class="space-y-1">
          <div class="empty-state">点击「浏览」加载数据集目录</div>
        </div>
      </div>
    </section>

    <!-- ================================================================ -->
    <!-- 2. 运行控制台 -->
    <!-- ================================================================ -->
    <section id="page-run" class="page hidden">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <!-- 选项区 -->
        <div class="glass-card lg:col-span-1">
          <h2 class="text-lg font-semibold mb-4">运行选项</h2>
          <div class="space-y-4">
            <div>
              <label class="lbl block mb-1">输入目录</label>
              <input id="run-input" class="input" value="C:\Users\BTW\Desktop\20260328new">
            </div>
            <div>
              <label class="lbl block mb-1">输出目录</label>
              <input id="run-output" class="input" value="out">
            </div>
            <div>
              <label class="lbl block mb-1">V6 后端</label>
              <select id="run-v6backend" class="input">
                <option value="paddleocr">paddleocr</option>
                <option value="rapidocr">rapidocr</option>
              </select>
            </div>
            <div>
              <label class="lbl block mb-1">Limit（只处理前 N 张，留空=全部）</label>
              <input id="run-limit" class="input" type="number" min="1" placeholder="如 10">
            </div>
            <div class="flex items-center gap-4">
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" id="run-novl"> 仅 V6（关 VL）
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" id="run-cpu"> 强制 CPU
              </label>
            </div>
            <button id="run-btn" class="btn-gradient w-full pulse" onclick="startRun()">开始标注</button>
          </div>
        </div>

        <!-- 进度 + 结果流 -->
        <div class="glass-card lg:col-span-2">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-semibold">实时进度</h2>
            <span id="run-status" class="text-sm text-muted">空闲</span>
          </div>
          <!-- 进度条 -->
          <div class="progress-track mb-2">
            <div id="run-progress" class="progress-fill" style="width:0%"></div>
          </div>
          <div class="flex items-center justify-between text-sm mb-4">
            <span id="run-pct" class="text-muted">0 / 0</span>
            <span id="run-current" class="text-mono text-xs text-muted truncate ml-4"></span>
          </div>
          <!-- 统计小卡 -->
          <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="stat-card" style="padding:0.8rem">
              <div class="num green" id="run-pre-count" style="font-size:1.5rem">0</div>
              <div class="label">预标注</div>
            </div>
            <div class="stat-card" style="padding:0.8rem">
              <div class="num orange" id="run-review-count" style="font-size:1.5rem">0</div>
              <div class="label">待复核</div>
            </div>
            <div class="stat-card" style="padding:0.8rem">
              <div class="num" id="run-done-count" style="font-size:1.5rem">0</div>
              <div class="label">已处理</div>
            </div>
          </div>
          <!-- 结果流 -->
          <div id="run-stream" class="scroll-list">
            <div class="empty-state">点击「开始标注」启动任务</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ================================================================ -->
    <!-- 3. 仪表盘 -->
    <!-- ================================================================ -->
    <section id="page-dashboard" class="page hidden">
      <div class="glass-card mb-5">
        <div class="flex flex-wrap items-end gap-3">
          <div>
            <label class="lbl block mb-1">输出目录</label>
            <input id="dash-output" class="input" style="width:320px" value="out">
          </div>
          <button class="btn-gradient" onclick="loadResults(document.getElementById('dash-output').value)">加载结果</button>
          <span id="dash-summary-text" class="text-sm text-muted ml-2"></span>
        </div>
      </div>

      <!-- 统计卡 -->
      <div id="dash-stats" class="grid-stats mb-5">
        <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">总数</div></div>
        <div class="stat-card"><div class="num green" id="stat-pre">-</div><div class="label">预标注</div></div>
        <div class="stat-card"><div class="num orange" id="stat-review">-</div><div class="label">待复核</div></div>
        <div class="stat-card"><div class="num cyan" id="stat-corrected">-</div><div class="label">已修正</div></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <!-- 环形图 -->
        <div class="glass-card">
          <h3 class="text-base font-semibold mb-3">预标注 / 待复核 占比</h3>
          <div style="position:relative;height:240px">
            <canvas id="dash-chart"></canvas>
          </div>
        </div>
        <!-- 结果表 -->
        <div class="glass-card lg:col-span-2">
          <div class="flex gap-2 mb-3">
            <button class="btn-mini" id="dash-tab-pre" onclick="dashSwitchTable('pre')">预标注表</button>
            <button class="btn-mini" id="dash-tab-review" onclick="dashSwitchTable('review')">待复核表</button>
          </div>
          <div id="dash-table" class="scroll-list">
            <div class="empty-state">点击「加载结果」查看数据</div>
          </div>
          <div id="dash-pager" class="pager"></div>
        </div>
      </div>
    </section>

    <!-- ================================================================ -->
    <!-- 4. 人工修正 -->
    <!-- ================================================================ -->
    <section id="page-correct" class="page hidden">
      <div class="glass-card mb-5">
        <div class="flex flex-wrap items-end gap-3">
          <div>
            <label class="lbl block mb-1">输出目录</label>
            <input id="corr-output" class="input" style="width:320px" value="out">
          </div>
          <button class="btn-gradient" onclick="loadReview(document.getElementById('corr-output').value, 1)">加载待复核</button>
          <span id="corr-info" class="text-sm text-muted ml-2"></span>
        </div>
      </div>
      <div id="corr-list" class="space-y-4">
        <div class="empty-state">点击「加载待复核」开始人工修正</div>
      </div>
      <div id="corr-pager" class="pager"></div>
    </section>
  </main>

  <div id="toast-container"></div>
  <div id="modal-root"></div>
  <script src="/static/app.js"></script>
</body>
</html>
